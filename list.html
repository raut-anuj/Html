<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    <h1>My Lists.</h1>

    <h2>Unordered List</h2>
    <ul style="list-style-type: upper-alpha;">
        <li>1.Hello</li>
        <li>2.Hii</li>
        <li>3.Bye</li>
        <li>4.Good</li>
        <li>5.Better</li>
    </ul>
    

    <h2>Ordered List</h2>
    <ol type="a">
        <li>1.Hello</li>
        <li>2.Hii</li>
        <li>3.Bye</li>
        <li>4.Good</li>
        <li>5.Better</li>
    </ol>
</body>
</html>
