<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
    <style>
        table{
            width: 50%;
            border-collapse: collapse;
            text-align: center;
            color: rgb(38, 41, 38);

        }
        td, th{
            border: 1px solid rgb(145, 9, 230);
            padding: 50px;
        }
        tr{
            background-color: rgb(125, 143, 81);
        }
        tr:nth-child(odd){
            background-color: rgb(178, 79, 79);
        }
    </style>
</head>
<body>
     <table>
        <tr>
            <th>Continent</th>
            <th>Country</th>
            <th>State</th>
        </tr>
        <tr>
            <td>Asia</td>
            <td>India</td>
            <td>Bihar</td>
        </tr>
        <tr>
            <td>Europe</td>
            <td>Australia</td>
            <td>Kon jong</td>
        </tr>
        <tr>
            <td>Europe</td>
            <td>USA</td>
            <td>America</td>
        </tr>
        <tr>
            <td>Europe</td>
            <td>Turkry</td>
            <td>AzarBizan</td>
        </tr>
        <tr>
            <td>Asia</td>
            <td>South</td>
            <td>SriLanka</td>
        </tr>
        <tr>
            <td>Asia</td>
            <td>India</td>
            <td>Delhi</td>
        </tr>
        <tr>
            <td>Asia</td>
            <td>China</td>
            <td>Co-Knong</td>
        </tr>
     </table>
</body>
</html>
